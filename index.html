<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeon Ga Hyun | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: white; margin: 0; overflow-x: hidden; }
        .text-stroke { -webkit-text-stroke: 1px rgba(255,255,255,0.3); color: transparent; }
        .brutal-border { border: 1px solid rgba(255,255,255,0.1); }
        .text-accent { color: #f43f5e; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const BASE = "https://raw.githubusercontent.com/jgh041015-boop/jeongahyun.github.io/main/";

        // 에러 원천 차단: 컴포넌트 호출 방식을 가장 단순한 함수형으로 통일
        function App() {
            const [showMain, setShowMain] = useState(false);

            const activities = [
                { d: "2024/05/21 ~ 2024/08/18", t: "교내 소모임 '크로셰' 소모임장", c: "다양한 창작 활동 진행." },
                { d: "2025/05/01 ~ 2025/08/18", t: "교내 소모임 '알쓸한잡'", c: "인스타/숏폼 기획 제작." },
                { d: "2025/11/28", t: "2025 한성 SW 페스티벌", c: "AI 영상 제작 최우수상 수상." },
                { d: "2026/3/03 ~ 현재", t: "2026 여수세계섬박람회 서포터즈", c: "AI 애니메이션 제작 중." }
            ];

            const works = [
                { t: "가나 광고", g: ['gana_gift.png', 'gana_yt.png', 'gana_movie.png', 'gana_interpark.png', 'gana_reels.png'] },
                { t: "THE GUEST", g: ['guest_poster.png'] },
                { t: "나루와 상이", g: ['naru_1.png', 'naru_2.png', 'naru_3.png', 'naru_4.png', 'naru_5.png'] }
            ];

            // 인트로 화면
            if (!showMain) {
                return (
                    <div className="fixed inset-0 flex items-center justify-center bg-zinc-950 cursor-pointer" onClick={() => setShowMain(true)}>
                        <div className="text-center">
                            <h1 className="text-7xl md:text-[10rem] font-bold uppercase tracking-tighter leading-none hover:text-accent transition-all">Jeon<br/>Ga Hyun</h1>
                            <p className="mt-8 text-sm uppercase tracking-[0.5em] opacity-40">Click to Enter</p>
                        </div>
                    </div>
                );
            }

            // 본문 화면
            return (
                <div className="p-6 md:p-12 max-w-6xl mx-auto">
                    <header className="mb-24 flex justify-between items-center">
                        <h1 className="text-xl font-bold uppercase cursor-pointer" onClick={() => setShowMain(false)}>Jeon Ga Hyun</h1>
                    </header>

                    <section className="mb-40">
                        <p className="text-accent text-xs font-bold uppercase mb-4">Content Creator</p>
                        <h2 className="text-7xl md:text-9xl font-bold uppercase tracking-tighter leading-none mb-10">Creative <br/> <span className="text-stroke">Visionary</span></h2>
                        <div className="flex flex-col md:flex-row gap-10 items-center">
                            <p className="flex-1 text-zinc-400 text-lg">디지털 툴과 AI를 활용해 상상을 현실로 구현하는 전가현입니다.</p>
                            <img src={BASE + "profile.jpg"} className="w-48 h-48 rounded-full brutal-border object-cover grayscale" />
                        </div>
                    </section>

                    <section className="mb-40 grid md:grid-cols-2 gap-10">
                        <div className="p-8 brutal-border bg-zinc-900/50">
                            <h3 className="text-accent text-xs uppercase mb-6 font-bold">01 Profile</h3>
                            <p className="text-zinc-300 mb-2">전가현 (2004-04-10)</p>
                            <p className="text-zinc-500 text-sm">한성대 문콘 / SW연계전공</p>
                        </div>
                        <div className="p-8 brutal-border bg-zinc-900/50">
                            <h3 className="text-accent text-xs uppercase mb-6 font-bold">02 Skills</h3>
                            <p className="text-sm text-zinc-400">Premiere Pro, Photoshop, Midjourney, Runway, Figma</p>
                        </div>
                    </section>

                    <section className="mb-40">
                        <h3 className="text-3xl font-bold mb-12 uppercase">Selected Works</h3>
                        <div className="space-y-20">
                            {works.map((work, idx) => (
                                <div key={idx}>
                                    <h4 className="text-xl font-bold mb-4">{work.t}</h4>
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
                                        {work.g.map((img, i) => (
                                            <div key={i} className="aspect-square bg-zinc-900 brutal-border overflow-hidden">
                                                <img src={BASE + img} className="w-full h-full object-cover opacity-60 hover:opacity-100 transition-opacity" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="py-20 border-t border-zinc-900 text-center opacity-20 text-[10px] tracking-widest uppercase">
                        © 2026 JEON GA HYUN. ALL RIGHTS RESERVED.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
