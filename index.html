<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeon Ga Hyun | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: white; margin: 0; overflow-x: hidden; }
        .text-stroke { -webkit-text-stroke: 1px rgba(255,255,255,0.3); color: transparent; }
        .brutal-border { border: 1px solid rgba(255,255,255,0.1); }
        .text-accent { color: #f43f5e; }
        .bg-accent { background-color: #f43f5e; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        const BASE = "https://raw.githubusercontent.com/jgh041015-boop/jeongahyun.github.io/main/";

        // 아이콘을 안전하게 불러오는 방식 (가현님 코드 내 Lucide 아이콘 해결)
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const IconTag = lucide[name];
            return IconTag ? <IconTag size={size} className={className} /> : null;
        };

        const SectionTitle = ({ children, number }) => (
            <div className="flex items-baseline gap-4 mb-12">
                <span className="text-accent text-4xl opacity-50 font-bold">{number}</span>
                <h2 className="text-5xl md:text-7xl font-bold uppercase tracking-tighter">{children}</h2>
            </div>
        );

        const SkillBar = ({ name, percentage }) => (
            <div className="mb-6">
                <div className="flex justify-between mb-2">
                    <span className="font-medium uppercase tracking-wider text-sm">{name}</span>
                    <span className="text-xs opacity-60">{percentage}%</span>
                </div>
                <div className="h-1 bg-white/10 w-full overflow-hidden rounded-full">
                    <motion.div 
                        initial={{ width: 0 }}
                        whileInView={{ width: `${percentage}%` }}
                        transition={{ duration: 1, ease: "easeOut" }}
                        className="h-full bg-accent rounded-full"
                    />
                </div>
            </div>
        );

        function App() {
            const [showMain, setShowMain] = useState(false);

            const activities = [
                { date: "2024/05/21 ~ 2024/08/18", title: "교내 소모임 ‘크로셰’ 소모임장", desc: "교내 소모임을 이끌며 다양한 창작 활동을 진행함." },
                { date: "2025/05/01 ~ 2025/08/18", title: "교내 소모임 ‘알쓸한잡’", desc: "인스타그램 계정 운영. 카페 추천 숏폼 기획/제작.", icon: "Instagram" },
                { date: "2025/09/01 ~ 2025/12/05", title: "학과 소모임 ‘프리즘’", desc: "독서 소모임 활동 및 학과 우수 소모임 선정." },
                { date: "2025. 9. 5. ~ 현재", title: "개인 유튜브 채널 운영", desc: "콘서트 브이로그 편집. 최근 영상 조회수 1천 회 기록.", icon: "Youtube" },
                { date: "2025/11/24", title: "2025 단양갱 페스타 서포터즈", desc: "AI 활용 홍보 영상 제작." },
                { date: "2025/11/28", title: "2025 한성 SW 페스티벌", desc: "생성형 AI 영상 제작 최우수상 수상." },
                { date: "2026/3/03 ~ 현재", title: "2026 여수세계섬박람회 서포터즈", desc: "AI 애니메이션 제작 중." }
            ];

            const works = [
                { title: "가나 광고", type: "AD", items: "Figma 인쇄광고 비주얼", gallery: ['gana_gift.png', 'gana_yt.png', 'gana_movie.png', 'gana_interpark.png', 'gana_reels.png'] },
                { title: "<방문자: The Guest>", type: "Animation", items: "AI 크리에이티브 콘텐츠 챌린지 수상작", gallery: ['guest_poster.png'] },
                { title: "<나루와 상이>", type: "Animation", items: "여수국제웹드라마영화제 출품 예정", gallery: ['naru_1.png', 'naru_2.png', 'naru_3.png', 'naru_4.png', 'naru_5.png'] }
            ];

            return (
                <div className="min-h-screen bg-zinc-950">
                    <AnimatePresence mode="wait">
                        {!showMain ? (
                            <motion.div key="intro" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0, y: -20 }} className="fixed inset-0 z-[100] flex items-center justify-center bg-zinc-950 cursor-pointer" onClick={() => setShowMain(true)}>
                                <div className="text-center">
                                    <h1 className="text-7xl md:text-[10rem] font-bold uppercase tracking-tighter leading-none hover:text-accent transition-colors duration-500">Jeon <br className="md:hidden" /> Ga Hyun</h1>
                                    <p className="mt-8 text-sm uppercase tracking-[0.5em] opacity-40 animate-pulse">Click to Enter</p>
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 0.8 }}>
                                <header className="fixed top-0 left-0 w-full z-50 mix-blend-difference px-6 py-8 md:px-12 flex justify-between items-center text-white">
                                    <h1 className="text-2xl font-bold uppercase cursor-pointer" onClick={() => setShowMain(false)}>Jeon Ga Hyun</h1>
                                    <nav className="hidden md:flex gap-8 text-xs uppercase tracking-widest font-semibold">
                                        <a href="#profile" className="hover:text-accent transition-colors">Profile</a>
                                        <a href="#skills" className="hover:text-accent transition-colors">Skills</a>
                                        <a href="#activities" className="hover:text-accent transition-colors">Activities</a>
                                        <a href="#works" className="hover:text-accent transition-colors">Works</a>
                                    </nav>
                                </header>

                                <main className="pt-32 pb-24 px-6 md:px-12 max-w-7xl mx-auto">
                                    <section className="mb-32 min-h-[70vh] flex items-center">
                                        <div className="flex flex-col md:flex-row gap-8 items-center justify-between w-full">
                                            <div className="md:w-3/4">
                                                <p className="text-accent text-sm mb-4 uppercase tracking-widest">Content Planner & Creator</p>
                                                <h1 className="text-7xl md:text-9xl font-bold uppercase leading-[0.85] tracking-tighter mb-10">Creative <br /> <span className="text-stroke">Visionary</span></h1>
                                                <p className="text-lg md:text-xl text-zinc-400 max-w-2xl">창의적인 시선으로 세상을 담는 콘텐츠 기획자 전가현입니다. AI를 활용해 상상을 현실로 구현합니다.</p>
                                            </div>
                                            <div className="md:w-1/4">
                                                <div className="w-64 h-64 rounded-full overflow-hidden brutal-border"><img src={BASE + "profile.jpg"} className="w-full h-full object-cover grayscale hover:grayscale-0" /></div>
                                            </div>
                                        </div>
                                    </section>

                                    <section id="profile" className="mb-40">
                                        <SectionTitle number="01">Profile</SectionTitle>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-16 text-lg">
                                            <div className="space-y-6">
                                                <p className="flex items-center gap-4"><LucideIcon name="User" /> 전가현 (2004-04-10)</p>
                                                <p className="flex items-center gap-4"><LucideIcon name="GraduationCap" /> 한성대학교 문콘 / SW연계전공</p>
                                                <p className="flex items-center gap-4"><LucideIcon name="Mail" /> jgh041098@naver.com</p>
                                            </div>
                                            <div className="p-8 bg-zinc-900 brutal-border rounded-2xl"><h3 className="text-accent text-xs mb-4 uppercase">Awards</h3><p>• 2025 생성 AI 콘텐츠 챌린지 최우수상</p></div>
                                        </div>
                                    </section>

                                    <section id="skills" className="mb-40">
                                        <SectionTitle number="02">Abilities</SectionTitle>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-20">
                                            <div><SkillBar name="Premiere Pro" percentage={70}/><SkillBar name="AI Tools" percentage={70}/></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="p-6 bg-zinc-900 brutal-border rounded-xl text-center">Figma</div>
                                                <div className="p-6 bg-zinc-900 brutal-border rounded-xl text-center">Notion</div>
                                            </div>
                                        </div>
                                    </section>

                                    <section id="works" className="mb-40">
                                        <SectionTitle number="03">Works</SectionTitle>
                                        <div className="space-y-20">
                                            {works.map((work, idx) => (
                                                <div key={idx}>
                                                    <h3 className="text-3xl font-bold mb-6">{work.title}</h3>
                                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                                        {work.gallery.map((img, i) => (
                                                            <div key={i} className="aspect-square bg-zinc-900 brutal-border overflow-hidden rounded-lg">
                                                                <img src={BASE + img} className="w-full h-full object-cover opacity-60 hover:opacity-100 transition-opacity" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </main>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
