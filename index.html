<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeon Ga Hyun | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: white; margin: 0; }
        .text-stroke { -webkit-text-stroke: 1px rgba(255,255,255,0.3); color: transparent; }
        .brutal-border { border: 1px solid rgba(255,255,255,0.1); }
        .text-accent { color: #f43f5e; }
        .bg-accent { background-color: #f43f5e; }
        /* 스킬바 애니메이션 효과 */
        .skill-progress { transition: width 1.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const BASE = "https://raw.githubusercontent.com/jgh041015-boop/jeongahyun.github.io/main/";

        // 아이콘을 안전하게 사용하기 위한 컴포넌트
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const SkillBar = ({ name, percentage }) => (
            <div className="mb-6">
                <div className="flex justify-between mb-2">
                    <span className="text-sm font-bold uppercase tracking-wider">{name}</span>
                    <span className="text-xs opacity-60">{percentage}%</span>
                </div>
                <div className="h-1 bg-white/10 w-full overflow-hidden">
                    <div className="h-full bg-accent skill-progress" style={{ width: `${percentage}%` }}></div>
                </div>
            </div>
        );

        function App() {
            const activities = [
                { date: "2024/05/21 ~ 2024/08/18", title: "교내 소모임 '크로셰' 소모임장", desc: "교내 소모임을 이끌며 다양한 창작 활동을 진행함." },
                { date: "2025/05/01 ~ 2025/08/18", title: "교내 소모임 '알쓸한잡'", desc: "인스타그램 운영 및 카페 추천 숏폼 기획/제작.", icon: "Instagram" },
                { date: "2025/09/01 ~ 2025/12/05", title: "학과 소모임 '프리즘'", desc: "문학 기반 콘텐츠 기획 및 학과 우수 소모임 선정." },
                { date: "2025. 9. 5. ~ 현재", title: "개인 유튜브 채널 운영", desc: "공연 브이로그 편집. 최근 영상 조회수 1천 회 기록.", icon: "Youtube" },
                { date: "2025/11/24", title: "2025 단양갱 페스타 서포터즈", desc: "AI 활용 홍보 영상 및 음악 제작." },
                { date: "2025/11/28", title: "2025 한성 SW 페스티벌", desc: "생성형 AI 영상 제작 및 전시 부문 최우수상 수상." },
                { date: "2026/3/03 ~ 현재", title: "2026 여수세계섬박람회 서포터즈", desc: "AI 활용 여수 배경 애니메이션 제작 중." }
            ];

            return (
                <div className="max-w-7xl mx-auto px-6 md:px-12 py-10">
                    <header className="flex justify-between items-center mb-24">
                        <h1 className="text-2xl font-bold tracking-tighter uppercase">Jeon Ga Hyun</h1>
                        <div className="flex gap-6 opacity-60">
                            <Icon name="Monitor" /> <Icon name="Video" /> <Icon name="PenTool" />
                        </div>
                    </header>

                    <section className="mb-40 flex flex-col md:row items-center justify-between gap-12">
                        <div className="md:w-2/3">
                            <p className="text-accent text-sm mb-4 font-bold tracking-widest uppercase">Content Planner & Creator</p>
                            <h2 className="text-7xl md:text-9xl font-bold uppercase leading-none tracking-tighter mb-8">
                                Creative <br /> <span className="text-stroke">Visionary</span>
                            </h2>
                            <p className="text-xl text-zinc-400 max-w-2xl leading-relaxed">
                                창의적인 시선으로 세상을 담는 전가현입니다. <br/>
                                디지털 툴과 AI를 활용해 상상을 현실로 구현합니다.
                            </p>
                        </div>
                        <div className="md:w-1/3 flex justify-center">
                            <div className="w-64 h-64 rounded-full overflow-hidden brutal-border shadow-2xl">
                                <img src={BASE + "profile.jpg"} className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" />
                            </div>
                        </div>
                    </section>

                    <section className="mb-40 grid grid-cols-1 md:grid-cols-2 gap-20">
                        <div>
                            <h3 className="text-accent text-xs uppercase mb-10 tracking-widest flex items-center gap-2"><Icon name="User" size={16}/> Profile</h3>
                            <div className="space-y-6 text-lg">
                                <div className="flex items-center gap-4 text-zinc-300"><Icon name="Calendar" /> 2004-04-10</div>
                                <div className="flex items-center gap-4 text-zinc-300"><Icon name="GraduationCap" /> 한성대 문학문화콘텐츠 / SW연계전공</div>
                                <div className="flex items-center gap-4 text-zinc-300"><Icon name="Mail" /> jgh041098@naver.com</div>
                            </div>
                        </div>
                        <div>
                            <h3 className="text-accent text-xs uppercase mb-10 tracking-widest flex items-center gap-2"><Icon name="Layers" size={16}/> Skills</h3>
                            <SkillBar name="Premiere Pro" percentage={70} />
                            <SkillBar name="Photoshop" percentage={50} />
                            <SkillBar name="AI Tools (Midjourney, Runway)" percentage={70} />
                        </div>
                    </section>

                    <section className="mb-40">
                        <h3 className="text-accent text-xs uppercase mb-10 tracking-widest flex items-center gap-2"><Icon name="Award" size={16}/> Experience</h3>
                        <div className="space-y-10 border-l border-white/10 pl-8 ml-2">
                            {activities.map((act, i) => (
                                <div key={i} className="relative">
                                    <div className="absolute -left-[37px] top-1 w-3 h-3 rounded-full bg-accent"></div>
                                    <span className="text-xs text-accent font-bold mb-1 block uppercase">{act.date}</span>
                                    <h4 className="text-xl font-bold mb-2 flex items-center gap-2">
                                        {act.title} {act.icon && <Icon name={act.icon} size={16} className="text-zinc-500" />}
                                    </h4>
                                    <p className="text-zinc-400 text-sm">{act.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="py-20 border-t border-zinc-900 text-center opacity-30 text-[10px] tracking-widest">
                        © 2026 JEON GA HYUN. ALL RIGHTS RESERVED.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
